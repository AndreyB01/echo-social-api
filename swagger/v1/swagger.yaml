---
openapi: 3.0.1
info:
  title: API V1
  version: v1
servers:
- url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
- bearerAuth: []
paths:
  "/api/v1/hashtags/{id}/posts":
    get:
      summary: Get posts by hashtag
      tags:
      - Hashtags
      security:
      - bearerAuth: []
      parameters:
      - name: Authorization
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        description: Hashtag name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: posts found
  "/api/v1/notifications":
    get:
      summary: List notifications
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: notifications found
  "/api/v1/notifications/unread_count":
    get:
      summary: Unread notifications count
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: count returned
  "/api/v1/search":
    get:
      summary: Global search
      tags:
      - Search
      security:
      - bearerAuth: []
      parameters:
      - name: query
        in: query
        description: Search query
        schema:
          type: string
      responses:
        '200':
          description: search results
  "/api/v1/users/search":
    get:
      summary: Search users
      tags:
      - Users
      security:
      - bearerAuth: []
      parameters:
      - name: query
        in: query
        description: Search query
        schema:
          type: string
      responses:
        '200':
          description: users found
