---
openapi: 3.0.1
info:
  title: Echo API
  version: v1
  description: Echo social API
servers:
- url: http://localhost:3000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  "/api/v1/admin/reports":
    get:
      summary: List reports
      tags:
      - Admin
      security:
      - bearerAuth: []
      description: Admin only. Returns all reports.
      responses:
        '200':
          description: reports list
        '403':
          description: forbidden
  "/api/v1/admin/posts/{id}/hide":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Hide post
      tags:
      - Admin
      security:
      - bearerAuth: []
      description: Admin only. Sets hidden_at on post.
      responses:
        '200':
          description: post hidden
        '403':
          description: forbidden
  "/api/v1/admin/users/{id}/ban":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Ban user
      tags:
      - Admin
      security:
      - bearerAuth: []
      description: Admin only. Sets banned_at on user.
      responses:
        '200':
          description: user banned
        '403':
          description: forbidden
  "/api/v1/auth/register":
    post:
      summary: Register user
      tags:
      - Auth
      parameters: []
      responses:
        '201':
          description: user created
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                      id: 1
                      type: user
                      attributes:
                        email: john@example.com
                        username: john_doe
                        display_name: 
                        bio: 
                        created_at: '2026-05-29T12:00:00Z'
                    meta: {}
                    errors: []
        '422':
          description: validation failed
          content:
            application/json:
              examples:
                validation_error:
                  value:
                    errors:
                    - Email has already been taken
                    - Password is too short (minimum is 8 characters)
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                required:
                - errors
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: john@example.com
                    username:
                      type: string
                      example: john_doe
                    display_name:
                      type: string
                      example: John Doe
                    password:
                      type: string
                      example: password123
                    password_confirmation:
                      type: string
                      example: password123
                  required:
                  - email
                  - username
                  - display_name
                  - password
                  - password_confirmation
  "/api/v1/auth/login":
    post:
      summary: Login user
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: login success
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                      access_token: jwt_access_token
                      refresh_token: jwt_refresh_token
                      token_type: Bearer
                    meta: {}
                    errors: []
        '401':
          description: invalid credentials
          content:
            application/json:
              examples:
                invalid_credentials:
                  value:
                    error: Invalid credentials
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid credentials
                required:
                - error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    login:
                      type: string
                      example: john@example.com
                    password:
                      type: string
                      example: password123
                  required:
                  - login
                  - password
  "/api/v1/auth/refresh":
    post:
      summary: Refresh access token
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: token refreshed
          content:
            application/json:
              examples:
                success_response:
                  value:
                    access_token: new_access_token
                    refresh_token: new_refresh_token
                    token_type: Bearer
        '401':
          description: invalid refresh token
          content:
            application/json:
              examples:
                invalid_token:
                  value:
                    error: Invalid refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  example: refresh_token_value
              required:
              - refresh_token
  "/api/v1/auth/logout":
    post:
      summary: Logout user
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: logout success
          content:
            application/json:
              examples:
                success_response:
                  value:
                    message: Logged out successfully
        '401':
          description: invalid refresh token
          content:
            application/json:
              examples:
                invalid_token:
                  value:
                    error: Invalid refresh token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token:
                  type: string
                  example: refresh_token_value
              required:
              - refresh_token
  "/api/v1/auth/confirm":
    post:
      summary: Confirm email
      tags:
      - Auth
      parameters: []
      responses:
        '200':
          description: email confirmed
        '422':
          description: invalid token
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  example: confirmation_token
              required:
              - token
  "/api/v1/auth/resend_confirmation":
    post:
      summary: Resend confirmation email
      tags:
      - Auth
      description: Resend confirmation email to user
      parameters: []
      responses:
        '200':
          description: confirmation email sent
        '404':
          description: user not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    email:
                      type: string
                      example: user@example.com
                  required:
                  - email
  "/api/v1/posts/{post_id}/comments":
    parameters:
    - name: post_id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: List comments
      tags:
      - Comments
      responses:
        '200':
          description: comments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        body:
                          type: string
                          example: Nice post!
                        created_at:
                          type: string
                          format: date-time
                        author:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            username:
                              type: string
                              example: john_doe
                            email:
                              type: string
                              example: john@example.com
                            created_at:
                              type: string
                              format: date-time
                      required:
                      - id
                      - body
                      - created_at
                      - author
                  meta:
                    type: object
                    properties:
                      next_cursor:
                        type: string
                        nullable: true
                        example: 
                      limit:
                        type: integer
                        example: 20
                      has_next:
                        type: boolean
                        example: false
                    required:
                    - limit
                    - has_next
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
    post:
      summary: Create comment
      tags:
      - Comments
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      body:
                        type: string
                        example: Nice post!
                      created_at:
                        type: string
                        format: date-time
                      author:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          username:
                            type: string
                            example: john_doe
                          email:
                            type: string
                            example: john@example.com
                          created_at:
                            type: string
                            format: date-time
                    required:
                    - id
                    - body
                    - created_at
                    - author
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: object
                  properties:
                    body:
                      type: string
                      example: Nice post!
                  required:
                  - body
  "/api/v1/comments/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    delete:
      summary: Delete comment
      tags:
      - Comments
      security:
      - bearerAuth: []
      responses:
        '200':
          description: comment deleted
        '403':
          description: not authorized
  "/api/v1/feed":
    get:
      summary: Home feed
      tags:
      - Feed
      security:
      - bearerAuth: []
      description: Posts from followed users (including own posts). Cursor pagination.
      parameters:
      - name: cursor
        in: query
        required: false
        description: Pagination cursor
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: Items per page (default 20, max 50)
        schema:
          type: integer
      responses:
        '200':
          description: feed loaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        body:
                          type: string
                          example: Hello world
                        created_at:
                          type: string
                          format: date-time
                        likes_count:
                          type: integer
                          example: 5
                        comments_count:
                          type: integer
                          example: 2
                        hashtags:
                          type: array
                          items:
                            type: string
                          example:
                          - ruby
                          - rails
                        author:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            username:
                              type: string
                              example: john_doe
                      required:
                      - id
                      - body
                      - created_at
                  next_cursor:
                    type: string
                    nullable: true
  "/api/v1/feed/global":
    get:
      summary: Global feed
      tags:
      - Feed
      responses:
        '200':
          description: feed loaded
  "/api/v1/follow_requests":
    get:
      summary: List pending follow requests
      tags:
      - Follow Requests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: follow requests list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        follower:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 2
                            username:
                              type: string
                              example: john_doe
                            display_name:
                              type: string
                              example: John Doe
                      required:
                      - id
                      - follower
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
  "/api/v1/follow_requests/{id}/accept":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Accept follow request
      tags:
      - Follow Requests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: follow request accepted
        '404':
          description: not found
  "/api/v1/follow_requests/{id}/reject":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Reject follow request
      tags:
      - Follow Requests
      security:
      - bearerAuth: []
      responses:
        '200':
          description: follow request rejected
  "/api/v1/hashtags/{tag}/posts":
    get:
      summary: Get posts by hashtag
      tags:
      - Hashtags
      security:
      - bearerAuth: []
      parameters:
      - name: tag
        in: path
        description: Hashtag name
        required: true
        schema:
          type: string
      responses:
        '200':
          description: posts found
  "/api/v1/notifications":
    get:
      summary: List notifications
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: notifications found
          content:
            application/json:
              examples:
                success_response:
                  value:
                    success: true
                    data:
                    - id: 1
                      type: like
                      read: false
                      created_at: '2026-05-29T12:00:00Z'
                      actor:
                        id: 2
                        username: alice
                    meta:
                      next_cursor: 
                      limit: 20
                      has_next: false
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        type:
                          type: string
                          example: like
                        read:
                          type: boolean
                          example: false
                        created_at:
                          type: string
                          format: date-time
                        actor:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 2
                            username:
                              type: string
                              example: alice
                      required:
                      - id
                      - type
                      - read
                      - created_at
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
  "/api/v1/notifications/{id}/read":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Mark notification as read
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: notification marked as read
  "/api/v1/notifications/read_all":
    patch:
      summary: Mark all notifications as read
      tags:
      - Notifications
      security:
      - bearerAuth: []
      responses:
        '200':
          description: all notifications marked as read
  "/api/v1/posts":
    post:
      summary: Create post
      tags:
      - Posts
      security:
      - bearerAuth: []
      description: Create a new post. Idempotency key is required.
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        description: UUID v4 for idempotency
        schema:
          type: string
      responses:
        '201':
          description: post created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      body:
                        type: string
                        example: Hello world
                      created_at:
                        type: string
                        format: date-time
                      likes_count:
                        type: integer
                        example: 5
                      comments_count:
                        type: integer
                        example: 2
                      hashtags:
                        type: array
                        items:
                          type: string
                        example:
                        - ruby
                        - rails
                      author:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          username:
                            type: string
                            example: john_doe
                    required:
                    - id
                    - body
                    - created_at
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
        '422':
          description: validation failed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                post:
                  type: object
                  properties:
                    content:
                      type: string
                      example: 'Hello #world @alice'
                      description: 1-500 characters
                    image_id:
                      type: string
                      nullable: true
                      description: Signed blob ID for image
                  required:
                  - content
  "/api/v1/posts/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Show post
      tags:
      - Posts
      security:
      - bearerAuth: []
      responses:
        '200':
          description: post found
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      body:
                        type: string
                        example: Hello world
                      created_at:
                        type: string
                        format: date-time
                      likes_count:
                        type: integer
                        example: 5
                      comments_count:
                        type: integer
                        example: 2
                      hashtags:
                        type: array
                        items:
                          type: string
                        example:
                        - ruby
                        - rails
                      author:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          username:
                            type: string
                            example: john_doe
                    required:
                    - id
                    - body
                    - created_at
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
        '404':
          description: post not found
    delete:
      summary: Delete post
      tags:
      - Posts
      security:
      - bearerAuth: []
      responses:
        '200':
          description: post deleted
        '403':
          description: not your post
  "/api/v1/posts/{id}/like":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    post:
      summary: Like post
      tags:
      - Posts
      security:
      - bearerAuth: []
      responses:
        '201':
          description: post liked
    delete:
      summary: Unlike post
      tags:
      - Posts
      security:
      - bearerAuth: []
      responses:
        '200':
          description: post unliked
  "/api/v1/posts/{id}/report":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
    post:
      summary: Report a post
      tags:
      - Posts
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '201':
          description: report created
        '422':
          description: already reported
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                report:
                  type: object
                  properties:
                    reason:
                      type: string
                      example: Spam
                    category:
                      type: string
                      enum:
                      - spam
                      - abuse
                      - other
                  required:
                  - reason
  "/api/v1/me":
    get:
      summary: Current user profile
      tags:
      - Profile
      security:
      - bearerAuth: []
      responses:
        '200':
          description: profile found
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                      id: 1
                      email: john@example.com
                      username: john_doe
                      display_name: John Doe
                      bio: Ruby developer
                    meta: {}
                    errors: []
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: john@example.com
                      username:
                        type: string
                        example: john_doe
                      display_name:
                        type: string
                        nullable: true
                        example: John Doe
                      bio:
                        type: string
                        nullable: true
                        example: Ruby developer
                    required:
                    - id
                    - email
                    - username
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
    patch:
      summary: Update current user profile
      tags:
      - Profile
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: profile updated
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  type: object
                  properties:
                    display_name:
                      type: string
                      example: John Doe
                    bio:
                      type: string
                      example: Ruby developer
  "/api/v1/search":
    get:
      summary: Global search
      tags:
      - Search
      security:
      - bearerAuth: []
      parameters:
      - name: query
        in: query
        description: Search query
        schema:
          type: string
      responses:
        '200':
          description: search results
  "/api/v1/users/{username}":
    parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string
    get:
      summary: Get user profile
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: user profile found
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                      id: 1
                      username: john_doe
                      display_name: John Doe
                      bio: Ruby developer
                    meta: {}
                    errors: []
        '404':
          description: user not found
          content:
            application/json:
              examples:
                not_found:
                  value:
                    error: User not found
  "/api/v1/users/{username}/posts":
    parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string
    get:
      summary: List user posts
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: posts found
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                    - id: 1
                      body: Hello world
                      created_at: '2026-06-02T12:00:00Z'
                      likes_count: 5
                      comments_count: 2
                    meta: {}
                    errors: []
  "/api/v1/users/{username}/followers":
    parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string
    get:
      summary: List user followers
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: followers found
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                    - id: 2
                      username: alice
                      display_name: Alice
                    meta: {}
                    errors: []
  "/api/v1/users/{username}/following":
    parameters:
    - name: username
      in: path
      required: true
      schema:
        type: string
    get:
      summary: List user following
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: following found
          content:
            application/json:
              examples:
                success_response:
                  value:
                    data:
                    - id: 3
                      username: bob
                      display_name: Bob
                    meta: {}
                    errors: []
  "/api/v1/users/{username}/follow":
    parameters:
    - name: username
      in: path
      schema:
        type: string
      required: true
    post:
      summary: Follow user
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '201':
          description: follow created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      following:
                        type: boolean
                      requested:
                        type: boolean
                      status:
                        type: string
                      user_id:
                        type: integer
                  meta:
                    type: object
                    nullable: true
                  errors:
                    type: array
                    items:
                      type: string
                    example: []
                required:
                - data
    delete:
      summary: Unfollow user
      tags:
      - Users
      security:
      - bearerAuth: []
      parameters:
      - name: username
        in: path
        schema:
          type: string
        required: true
      responses:
